<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - MST Radio Network</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="persistent-player.js?v=20260620" defer></script>
    <style>
        .article-detail-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #1a1a1a;
            border: 2px solid #d4af37;
            border-radius: 10px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #ffed4e;
        }

        .article-detail h1 {
            color: #d4af37;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .article-detail-date {
            color: #b0b0b0;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #333333;
        }

        .article-detail-content {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.9;
            margin-bottom: 2rem;
        }

        .article-detail-content p {
            margin-bottom: 1.5rem;
        }

        .article-detail-image {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.55);
            margin-bottom: 1.5rem;
            display: block;
        }

        .article-detail-source {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #333333;
            color: #d4af37;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .article-detail-source a {
            color: #ffed4e;
            text-decoration: none;
        }

        .article-detail-source a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="home">
        <div class="logo">
            <img src="images/mst-logo.png" alt="MST Logo">
        </div>

        <div class="menu-toggle">☰</div>

        <ul class="menu">
            <li><a href="index.html?skipLoading=1#home">Home</a></li>
            <li><a href="index.html#stations">Stations</a></li>
            <li><a href="index.html#player">Listen Live</a></li>
            <li><a href="index.html#sports">Watch Now</a></li>
            <li><a href="index.html#news">News</a></li>
            <li><a href="index.html#events">Events</a></li>
            <li><a href="index.html#local-listings">Local Listings</a></li>
            <li><a href="index.html#advertise">Advertise</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>

        <a href="index.html#player" class="live-btn watch-now-disabled" aria-disabled="true">
            LIVE NOW
        </a>
    </header>

    <!-- Article Detail Section -->
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <section style="background-color: #2a2a2a; padding: 4rem 2rem;">
        <div class="article-detail-container">
            <a href="javascript:history.back()" class="back-link">← Back to News</a>
            
            <div id="articleContent">
                <h1>Article Not Found</h1>
                <p>The article you're looking for could not be found.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>
            K101 • ROCK 105 • KNED • COOL 96.7
        </p>

        <p class="copyright">
            © 2025 McAlester Streaming Technologies
        </p>
    </footer>

    <script>
        // Display article detail
        const articleId = new URLSearchParams(window.location.search).get('id');
        const article = JSON.parse(sessionStorage.getItem('currentArticle'));
        const newsCategory = sessionStorage.getItem('newsCategory');

        if (article) {
            document.title = article.headline + ' - MST Radio Network';
            document.getElementById('articleContent').innerHTML = `
                <h1>${article.headline}</h1>
                <div class="article-detail-date">${article.date}</div>
                ${article.imageUrl ? `<img src="${article.imageUrl}" alt="${article.headline}" class="article-detail-image">` : ''}
                <div class="article-detail-content">
                    ${article.content.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                </div>
                ${article.sourceUrl ? `<div class="article-detail-source">Original source: <a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${article.sourceUrl}</a></div>` : ''}
            `;
        }
        
        // Set up back button to mark that we're returning from article
        document.querySelector('.back-link').addEventListener('click', function(e) {
            sessionStorage.setItem('returnFromArticle', 'true');
        });

        // Navigating to Home from this page should never reopen the news modal.
        document.querySelectorAll('a[href*="index.html"]').forEach((link) => {
            link.addEventListener('click', function() {
                sessionStorage.setItem('returnFromArticle', 'false');
            });
        });
    </script>
</body>
</html>
